    <style>

        :root {

            --orange-industrial: #ff8c00;
            --orange-electric: #ffb800;
            --black: #050505;
        }
        body, html { margin: 0; padding: 0; background: var(--black); color: var(--cyan); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        #matrix-background { position: fixed; top: 0; left: 0; z-index: 1; }
        .interface { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; background: radial-gradient(circle at center, transparent 0%, rgba(5,5,5,0.8) 100%); border: 1px solid rgba(0,255,255,0.1); }
        .top-bar, .bottom-bar { padding: 15px 40px; font-size: 0.7rem; letter-spacing: 2px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,255,255,0.1); }
        .bottom-bar { border-top: 1px solid rgba(0,255,255,0.1); border-bottom: none; }
        .main-layout { display: flex; justify-content: space-between; align-items: center; padding: 0 80px; flex-grow: 1; }
        .hero { max-width: 650px; }
        .industrial-orange { color: var(--orange-industrial); font-size: 2.8rem; text-shadow: 0 0 25px rgba(255,140,0,0.5); margin: 0; font-weight: 700; min-height: 3.2rem; }
        .subtitle { font-size: 1.1rem; letter-spacing: 4px; opacity: 0.9; margin-top: 5px; }
        .matrix-text { margin: 30px 0; line-height: 1.8; font-size: 0.85rem; border-left: 2px solid var(--cyan); padding-left: 20px; background: rgba(0,255,255,0.02); }
        .metrics-panel { display: flex; flex-direction: column; gap: 25px; text-align: right; border-right: 2px solid var(--orange-industrial); padding-right: 20px; }
        .metric-item .label { font-size: 0.65rem; letter-spacing: 2px; opacity: 0.6; }
        .metric-item .value { font-size: 2.2rem; font-weight: 700; color: var(--orange-industrial); margin: 5px 0; display: block; min-width: 120px; }
        .metric-item .desc { font-size: 0.6rem; opacity: 0.5; max-width: 200px; }
        .actions { display: flex; gap: 20px; margin-top: 20px; }
        .btn-primary { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { background: var(--cyan); color: var(--black); box-shadow: 0 0 30px var(--cyan); }
        .btn-secondary { background: transparent; border: 1px solid var(--orange-industrial); color: var(--orange-industrial); padding: 12px 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 5px var(--orange-industrial); }
        .btn-secondary:hover { border-color: var(--orange-electric); color: var(--orange-electric); box-shadow: 0 0 20px rgba(255,184,0,0.8), 0 0 40px rgba(255,140,0,0.4); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(5,5,5,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 40px; border: 1px solid var(--cyan); width: 80%; max-width: 1000px; }
        .canvas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .canvas-item { border: 1px solid rgba(0,255,255,0.1); padding: 15px; }
        .canvas-item.value-card { border-color: var(--orange-industrial); }
        .close-modal { float: right; cursor: pointer; color: var(--cyan); font-size: 1.5rem; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
